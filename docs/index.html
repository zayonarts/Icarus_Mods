<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayon's Icarus Mods</title>
    <style>
        /* --- PAGE SETUP --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background-color: #111418; /* Really dark grey fallback */
            overflow: hidden; /* Prevents scrollbars from the oversized background */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- ROTATING BACKGROUND --- */
        .rotating-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200vmax; 
            height: 200vmax;
            z-index: -2;
            background: conic-gradient(
                from 0deg,
                rgba(32, 160, 160, 0.4) 0deg,   /* Top Left: Teal-blue faded */
                #ff0000 90deg,                  /* Top Right: Lighter dark grey */
                rgba(32, 160, 160, 0.4) 180deg, /* Bottom Right: Teal-blue faded */
                #2a2d34 270deg,                 /* Bottom Left: Lighter dark grey */
                rgba(32, 160, 160, 0.4) 360deg  /* Complete the loop */
            );
            animation: spinBg 15s linear infinite;
        }

        /* --- DARK CENTER OVERLAY --- */
        .dark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            /* Keeps the center really dark grey (#111418) and fades out at the edges */
            background: radial-gradient(circle at center, #111418 50%, rgba(17, 20, 24, 0.2) 100%);
        }

        @keyframes spinBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 4rem;
            font-weight: 800;
            z-index: 1;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8); /* Helps the text pop */
        }
    </style>
</head>
<body>

    <div class="rotating-bg"></div>
    <div class="dark-overlay"></div>

    <h1>Zayon's Icarus Mods</h1>

</body>
</html>
